<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .detail-card {
            border: none;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 0.75rem 1.5rem rgba(0,0,0,.08);
        }
        .detail-card img {
            max-height: 420px;
            object-fit: cover;
        }
        footer {
            background-color: #212529;
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Tienda JHDO ASR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/categorias}">Categorías</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/terms}">Condiciones</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sobre-nosotros.html}">Sobre nosotros</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="mb-4">
        <a class="btn btn-outline-secondary" th:href="@{/categorias}">← Volver a categorías</a>
    </div>

    <div class="card detail-card">
        <img th:if="${categoria.imagen != null}"
             th:src="@{/imagenes/categorias/{img}(img=${categoria.imagen})}"
             th:alt="${categoria.nombre}"
             class="card-img-top">

        <img th:if="${categoria.imagen == null}"
             th:src="@{/imagenes/categorias/not-available.jpg}"
             alt="Imagen no disponible"
             class="card-img-top">

        <div class="card-body p-4 p-md-5">
            <h1 class="display-6 fw-bold mb-3" th:text="${categoria.nombre}">Nombre categoría</h1>
            <p class="lead mb-0" th:text="${categoria.descripcion}">Descripción</p>
        </div>
    </div>
</main>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">Tienda JHDO ASR - Detalle de categoría</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
