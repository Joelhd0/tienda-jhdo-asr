<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .page-header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
            border-radius: 1rem;
            padding: 3rem 2rem;
        }
        .category-card {
            border: none;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,.08);
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 1rem 2rem rgba(0,0,0,.12);
        }
        .category-card img {
            height: 220px;
            object-fit: cover;
        }
        footer {
            background-color: #212529;
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Tienda JHDO ASR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/categorias}">Categorías</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/terms}">Condiciones</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sobre-nosotros.html}">Sobre nosotros</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <section class="page-header mb-5">
        <h1 class="display-6 fw-bold mb-2">Categorías</h1>
        <p class="mb-0">Explora nuestras categorías de productos y descubre la colección disponible.</p>
    </section>

    <section class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="cat : ${categorias}">
            <div class="card category-card h-100">
                <img th:if="${cat.imagen != null}"
                     th:src="@{/imagenes/categorias/{img}(img=${cat.imagen})}"
                     th:alt="${cat.nombre}"
                     class="card-img-top">

                <img th:if="${cat.imagen == null}"
                     th:src="@{/imagenes/categorias/not-available.jpg}"
                     alt="Imagen no disponible"
                     class="card-img-top">

                <div class="card-body d-flex flex-column">
                    <h2 class="h4 card-title" th:text="${cat.nombre}">Nombre</h2>
                    <p class="card-text flex-grow-1" th:text="${cat.descripcion}">Descripción</p>
                    <a class="btn btn-primary mt-2" th:href="@{/categorias/{id}(id=${cat.id})}">
                        Ver categoría
                    </a>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">Tienda JHDO ASR - Categorías</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
